
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Optional: cancel in-progress runs of same branch to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          # If you have requirements files, you can specify:
          # cache-dependency-path: |
          #   requirements.txt
          #   requirements-dev.txt

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

  pytest:
    name: Tests (matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Show Python version
        run: python -V

      - name: Install package (prod)
        run: pip install .

      - name: Install dev extras
        run: pip install '.[dev]'

      - name: Run pytest (parallel)
        run: pytest -n auto --maxfail=1 --disable-warnings -q .

  coverage:
    name: Coverage (Py 3.13)
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/feature/docs'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package and dev dependencies
        run: pip install -e '.[dev]'

      - name: Run tests with coverage
        run: |
          pytest --cov=qcmet --cov-report=xml:coverage.xml
          coverage report -m

      - name: Generate coverage badge
        run: genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 90

      - name: Upload coverage badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badge.svg
          retention-days: 90

      - name: Coverage summary
        id: coverage-pct
        run: |
          pct=$(coverage report -m | awk '/TOTAL/ {print $NF}')
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total:** ${pct}" >> $GITHUB_STEP_SUMMARY
          COVERAGE=$(echo "$pct" | tr -d '%')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          # Calculate color based on coverage
          if [ "$COVERAGE" -ge 90 ]; then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif [ "$COVERAGE" -ge 80 ]; then
            echo "color=green" >> $GITHUB_OUTPUT
          elif [ "$COVERAGE" -ge 70 ]; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          elif [ "$COVERAGE" -ge 60 ]; then
            echo "color=orange" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge gist
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 3740a52e986452a0835806c50cb3d348
          filename: qcmet-coverage.json
          label: coverage
          message: ${{ steps.coverage-pct.outputs.percentage }}%
          color: ${{ steps.coverage-pct.outputs.color }}


  pages-build:
    name: Build docs (Sphinx)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write          # required for deployment to Pages
      id-token: write       # required by actions/deploy-pages
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show repo URL (info)
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"

      - name: Upgrade pip and install docs extras
        run: |
          python -m pip install --upgrade pip
          pip install '.[docs]'
          
      - name: Sphinx version
        run: sphinx-build --version

      - name: Build Sphinx HTML  
        working-directory: docs
        run: make html SPHINXBUILD="sphinx-build"


      - name: Prepare public directory
        run: |
          rm -rf public
          mkdir -p public
          cp -r docs/_build/html/* public/

      - name: Show Sphinx error logs if present
        shell: bash
        run: |
          if ls /tmp/sphinx-err-* >/dev/null 2>&1; then
            echo "=== Sphinx error log ==="
            cat /tmp/sphinx-err-*
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  pages-deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: pages-build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: https://qcmet.github.io/qcmet
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
